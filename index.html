<!doctype html>
<html lang="en">
  <head>
<script>
function fs_log_error(msg, stack) { fetch("/api/log-error", { method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify({ msg, stack }) }); }
window.onerror = function(msg, url, lineNo, columnNo, error) { console.error(msg, error); fs_log_error(msg, error ? error.stack : ""); fetch("/api/log-error", { method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify({ msg, url, lineNo, columnNo, error: error ? error.stack : null }) }); return false; };</script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>skilleditor</title>
    <script>
      window.addEventListener('error', function(e) {
        if (e.message && e.message.includes('ResizeObserver loop')) {
          e.stopImmediatePropagation();
          e.preventDefault();
        }
      });
      window.addEventListener('unhandledrejection', function(e) {
        if (e.reason && e.reason.message && e.reason.message.includes('ResizeObserver loop')) {
          e.stopImmediatePropagation();
          e.preventDefault();
        }
      });
    </script>

  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
